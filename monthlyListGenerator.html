<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date List Generator</title>
<link rel="stylesheet" href="css/index.css">
<link rel="stylesheet" href="css/stringPw.css">
<style>
/* Small page-specific adjustments to fit the site layout */
.generator {
    max-width: 820px;
    margin: 40px auto;
    padding: 20px;
    background: transparent;
}
.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    align-items: end;
}
.form-group label { display:block; margin-bottom:6px; font-weight:600; }
input[type="text"], input[type="number"], select {
    width:100%;
    padding:8px 10px;
    border:1px solid #ddd;
    border-radius:4px;
    box-sizing:border-box;
}
button { padding:10px 14px; border-radius:6px; border:none; background:#2b7cff; color:#fff; cursor:pointer; }
textarea { width:100%; height:360px; margin-top:14px; font-family: Consolas, monospace; padding:10px; box-sizing:border-box; }
.controls { display:flex; gap:8px; align-items:center; margin-top:8px; }
@media (max-width:640px) {
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
    <h1>My Side Projects</h1>
    <p>A collection of small experiments and tools</p>
</header>

<main>
  <section class="generator">
    <h2>Date List Generator</h2>

    <div class="form-grid">
      <div class="form-group">
        <label for="startDate">First Date (YYYYMMDD)</label>
        <input type="text" id="startDate" placeholder="20260801">
      </div>

      <div class="form-group">
        <label for="dayCount">Number of Dates</label>
        <input type="number" id="dayCount" value="31" min="1">
      </div>

      <div class="form-group">
        <label for="startWeekday">Weekday of First Date</label>
        <select id="startWeekday">
          <option>MON</option>
          <option>TUE</option>
          <option>WED</option>
          <option>THU</option>
          <option>FRI</option>
          <option>SAT</option>
          <option>SUN</option>
        </select>
      </div>

      <div class="form-group">
        <label>&nbsp;</label>
        <div class="controls">
          <button id="generateBtn">Generate</button>
          <button id="copyBtn" type="button">Copy</button>
        </div>
      </div>
    </div>

    <textarea id="output" readonly></textarea>
  </section>
</main>

<footer>
    <p>© 2026 sarcherc — All my little web toys in one place</p>
</footer>

<script>
function computeWeekdayFromYYYYMMDD(s) {
  if (!/^\d{8}$/.test(s)) return null;
  const y = parseInt(s.substring(0,4),10);
  const m = parseInt(s.substring(4,6),10) - 1;
  const d = parseInt(s.substring(6,8),10);
  const dt = new Date(y,m,d);
  if (isNaN(dt)) return null;
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  return days[dt.getDay()];
}

function generateList() {
  const startDateStr = document.getElementById('startDate').value.trim();
  const dayCount = parseInt(document.getElementById('dayCount').value) || 0;
  const startWeekday = document.getElementById('startWeekday').value;

  if (!/^\d{8}$/.test(startDateStr)) {
    alert('Please enter date in YYYYMMDD format');
    return;
  }
  if (dayCount <= 0) {
    alert('Please enter a positive number of dates');
    return;
  }

  const year = parseInt(startDateStr.substring(0, 4));
  const month = parseInt(startDateStr.substring(4, 6)) - 1;
  const day = parseInt(startDateStr.substring(6, 8));
  const startDate = new Date(year, month, day);

  const weekdays = ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'];
  let weekdayIndex = weekdays.indexOf(startWeekday);
  if (weekdayIndex === -1) weekdayIndex = 0;

  let result = [];
  for (let i = 0; i < dayCount; i++) {
    let currentDate = new Date(startDate);
    currentDate.setDate(startDate.getDate() + i);
    let yyyy = currentDate.getFullYear();
    let mm = String(currentDate.getMonth() + 1).padStart(2, '0');
    let dd = String(currentDate.getDate()).padStart(2, '0');
    let dateCode = `${yyyy}${mm}${dd}`;
    let weekday = weekdays[(weekdayIndex + i) % 7];
    result.push(`${dateCode} ${weekday}`);
  }
  document.getElementById('output').value = result.join('\n');
}

// Attach events
document.getElementById('generateBtn').addEventListener('click', generateList);

// Auto-set weekday when start date changes (helps align with other pages behavior)
document.getElementById('startDate').addEventListener('change', function(){
  const wd = computeWeekdayFromYYYYMMDD(this.value);
  if (wd) {
    // our select uses MON..SUN; computeWeekdayFromYYYYMMDD returns SUN..SAT
    const map = { 'SUN':'SUN','MON':'MON','TUE':'TUE','WED':'WED','THU':'THU','FRI':'FRI','SAT':'SAT' };
    const sel = document.getElementById('startWeekday');
    for (let i=0;i<sel.options.length;i++){
      if (sel.options[i].text === map[wd]) { sel.selectedIndex = i; break; }
    }
  }
});

// Copy output
document.getElementById('copyBtn').addEventListener('click', function(){
  const out = document.getElementById('output');
  out.select();
  try { document.execCommand('copy'); alert('Copied to clipboard'); }
  catch(e) { alert('Copy failed — select+Ctrl+C to copy'); }
});
</script>

</body>
</html>
